<svg xmlns="http://www.w3.org/2000/svg" width="600" height="420" viewBox="0 0 600 420" fill="none">
  <style>
    text { font-family: 'Noto Sans JP', 'Inter', sans-serif; }
    .label { font-size: 13px; fill: #1a1a1a; font-weight: 500; }
    .sublabel { font-size: 11px; fill: #999999; }
    .tag { font-size: 10px; fill: #999999; font-weight: 600; letter-spacing: 0.1em; }
    .note { font-size: 11px; fill: #999999; font-style: italic; }
  </style>

  <rect x="40" y="30" width="520" height="200" rx="0" stroke="#cccccc" stroke-width="1" fill="#ffffff"/>
  <text x="60" y="56" class="tag">YOUR PC</text>

  <rect x="80" y="80" width="160" height="50" rx="0" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1"/>
  <text x="160" y="110" class="label" text-anchor="middle">Claude Code</text>

  <line x1="240" y1="105" x2="320" y2="105" stroke="#cccccc" stroke-width="1.5"/>
  <polygon points="320,101 328,105 320,109" fill="#cccccc"/>

  <rect x="330" y="80" width="200" height="50" rx="0" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1"/>
  <text x="430" y="102" class="label" text-anchor="middle">作業フォルダ</text>
  <text x="430" y="118" class="sublabel" text-anchor="middle">ファイル読み書き</text>

  <text x="160" y="164" class="note" text-anchor="middle">AI の頭脳はここにはない</text>
  <line x1="160" y1="130" x2="160" y2="150" stroke="#cccccc" stroke-width="1" stroke-dasharray="4,3"/>

  <line x1="160" y1="230" x2="160" y2="290" stroke="#cccccc" stroke-width="1.5"/>
  <polygon points="156,290 160,298 164,290" fill="#cccccc"/>

  <text x="180" y="266" class="sublabel">インターネット経由</text>

  <rect x="40" y="310" width="520" height="80" rx="0" stroke="#1a1a1a" stroke-width="1.5" fill="#1a1a1a"/>
  <text x="300" y="346" text-anchor="middle" font-size="10" fill="#999999" font-weight="600" letter-spacing="0.1em" font-family="Noto Sans JP, sans-serif">ANTHROPIC SERVER</text>
  <text x="300" y="368" text-anchor="middle" font-size="11" fill="#666666" font-family="Noto Sans JP, sans-serif">ここで「考えている」</text>
</svg>
