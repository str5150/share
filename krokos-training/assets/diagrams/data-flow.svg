<svg xmlns="http://www.w3.org/2000/svg" width="560" height="260" viewBox="0 0 560 260" fill="none">
  <style>
    text { font-family: 'Noto Sans JP', 'Inter', sans-serif; }
    .label { font-size: 12px; fill: #1a1a1a; font-weight: 500; }
    .sublabel { font-size: 10px; fill: #999999; }
    .pct { font-size: 20px; fill: #1a1a1a; font-weight: 600; }
    .pct-label { font-size: 10px; fill: #999999; }
  </style>

  <rect x="30" y="58" width="120" height="52" rx="0" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1"/>
  <text x="90" y="82" class="label" text-anchor="middle">freee</text>
  <text x="90" y="98" class="sublabel" text-anchor="middle">会計データ</text>

  <line x1="150" y1="78" x2="200" y2="78" stroke="#cccccc" stroke-width="1.5"/>
  <polygon points="200,74 208,78 200,82" fill="#cccccc"/>

  <rect x="210" y="38" width="160" height="92" rx="0" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="218" y="56" font-size="9" fill="#999999" font-weight="600" letter-spacing="0.08em" font-family="Noto Sans JP, sans-serif">YOUR PC</text>
  <text x="290" y="80" class="label" text-anchor="middle">キーワード辞書</text>
  <text x="290" y="96" class="sublabel" text-anchor="middle">で自動分類</text>
  <text x="290" y="116" class="sublabel" text-anchor="middle">（ローカル処理）</text>

  <line x1="200" y1="92" x2="150" y2="92" stroke="#cccccc" stroke-width="1.5"/>
  <polygon points="150,88 142,92 150,96" fill="#cccccc"/>

  <line x1="290" y1="130" x2="290" y2="170" stroke="#cccccc" stroke-width="1.5"/>
  <polygon points="286,170 290,178 294,170" fill="#cccccc"/>

  <rect x="210" y="180" width="160" height="52" rx="0" fill="#1a1a1a"/>
  <text x="290" y="206" class="label" text-anchor="middle" fill="#e0e0e0">Anthropic</text>
  <text x="290" y="222" class="sublabel" text-anchor="middle" fill="#666666">判定できなかった分だけ</text>

  <line x1="250" y1="180" x2="250" y2="130" stroke="#cccccc" stroke-width="1.5" stroke-dasharray="4,3"/>

  <rect x="420" y="44" width="120" height="52" rx="0" fill="#f5f5f5"/>
  <text x="480" y="68" class="pct" text-anchor="middle">80%</text>
  <text x="480" y="86" class="pct-label" text-anchor="middle">PC 内で完結</text>

  <rect x="420" y="184" width="120" height="52" rx="0" fill="#f5f5f5"/>
  <text x="480" y="208" class="pct" text-anchor="middle">20%</text>
  <text x="480" y="226" class="pct-label" text-anchor="middle">API に送信</text>
</svg>
