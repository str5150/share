<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>議事録一覧 | クビレアーティスト</title>
  <style>
    :root {
      --bg: #f4f1ec;
      --paper: #fff;
      --ink: #1f1a17;
      --muted: #6d655e;
      --line: #e5ddd3;
      --soft: #f8f5f1;
      --accent: #9d5136;
      --accent-soft: #f3e9e2;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
      line-height: 1.68;
    }

    .page {
      width: min(800px, calc(100% - 24px));
      margin: 0 auto;
      padding: 48px 0 72px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 36px);
      letter-spacing: -0.03em;
    }

    .lead {
      color: var(--muted);
      font-size: 15px;
      margin: 0 0 32px;
    }

    .meeting-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .meeting-card {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(39, 29, 23, 0.05);
      padding: 24px 28px;
      text-decoration: none;
      color: inherit;
      display: grid;
      grid-template-columns: 100px 1fr;
      gap: 20px;
      align-items: center;
      transition: box-shadow 0.15s, border-color 0.15s;
    }

    .meeting-card:hover {
      border-color: var(--accent);
      box-shadow: 0 10px 30px rgba(157, 81, 54, 0.12);
    }

    .meeting-date {
      text-align: center;
    }

    .meeting-date .month {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .meeting-date .day {
      display: block;
      font-size: 36px;
      font-weight: 800;
      line-height: 1.1;
    }

    .meeting-date .year {
      display: block;
      font-size: 12px;
      color: var(--muted);
    }

    .meeting-info h2 {
      margin: 0 0 6px;
      font-size: 18px;
      line-height: 1.3;
    }

    .meeting-info p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      background: var(--accent-soft);
      color: var(--accent);
      margin-right: 6px;
    }

    @media (max-width: 640px) {
      .meeting-card {
        grid-template-columns: 1fr;
        gap: 12px;
        padding: 18px 16px;
      }
      .meeting-date { text-align: left; display: flex; gap: 8px; align-items: baseline; }
      .meeting-date .day { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>クビレアーティスト 議事録</h1>
    <p class="lead">MTGの議事録をまとめたページです。各回をクリックすると詳細が見られます。</p>

    <div class="meeting-list">

      <a class="meeting-card" href="./2026-03-26/">
        <div class="meeting-date">
          <span class="month">Mar</span>
          <span class="day">26</span>
          <span class="year">2026</span>
        </div>
        <div class="meeting-info">
          <h2><span class="badge">第2回</span>くびれMTG</h2>
          <p>導線設計（3パターン並走）、ターゲット分析（"時代遅れのマッチョ"層の発見）、業界プレイヤー情報、東京集中方針の決定、書籍出版・箱もこ登壇の検討</p>
        </div>
      </a>

      <a class="meeting-card" href="./2026-03-18/">
        <div class="meeting-date">
          <span class="month">Mar</span>
          <span class="day">18</span>
          <span class="year">2026</span>
        </div>
        <div class="meeting-info">
          <h2><span class="badge">第1回</span>久保さんMTG</h2>
          <p>収益構造の拡張（動画講座・マスターコンサル等の多層モデル）、久保さん=コンテンツ/別人材=セールスの役割分担合意、走りながら増やす方針</p>
        </div>
      </a>

    </div>
  </div>
</body>
</html>
